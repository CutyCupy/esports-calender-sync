<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>ECF Admin Panel</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0b0b0c;
        color: #e5e5e5;
        margin: 0;

        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header {
        background: #111;
        padding: 15px 30px;
        border-bottom: 2px solid #e30613;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      header h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
      }

      .container {
        flex: 1 1 auto;
        overflow-y: auto;
      }

      .content {
        max-width: 1000px;
        padding: 2rem;
        margin: auto;
      }

      .card {
        background: #151515;
        border: 1px solid #222;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 25px;
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .card-body {
        margin-top: 16px;
      }

      summary {
        cursor: pointer;
        user-select: none;
      }


      h2 {
        font-size: 20px;
        margin: 0;
      }

      .form-row {
        display: flex;
        gap: 16px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      /* --- Select --- */
      .select {
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid #222;
        background: #151515;
        color: #e5e5e5;
        min-width: 220px;
        cursor: pointer;

        appearance: none;
        background-image:
          linear-gradient(45deg, transparent 50%, #aaa 50%),
          linear-gradient(135deg, #aaa 50%, transparent 50%);
        background-position:
          calc(100% - 16px) calc(50% - 3px),
          calc(100% - 10px) calc(50% - 3px);
        background-size: 6px 6px;
        background-repeat: no-repeat;

        transition:
          border 0.2s,
          box-shadow 0.2s;
      }

      .select:hover {
        border-color: #333;
      }

      .select:focus {
        outline: none;
        border-color: #e30613;
        box-shadow: 0 0 0 1px #e30613;
      }

      /* --- Toggle Checkbox --- */
      .checkbox {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        user-select: none;
      }

      .checkbox input {
        display: none;
      }

      .toggle {
        width: 40px;
        height: 20px;
        background: #222;
        border-radius: 999px;
        position: relative;
        transition: background 0.2s;
      }

      .toggle::after {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        background: #aaa;
        border-radius: 50%;
        top: 2px;
        left: 2px;
        transition: all 0.2s;
      }

      .checkbox input:checked + .toggle {
        background: #e30613;
      }

      .checkbox input:checked + .toggle::after {
        left: 22px;
        background: #fff;
      }

      .checkbox span {
        font-size: 14px;
        color: #ccc;
      }

      .checkbox:hover .toggle {
        background: #333;
      }

      button {
        padding: 10px 16px;
        border-radius: 6px;
        border: none;
        cursor: pointer;

        display: inline-flex;
        align-items: center;
        gap: 6px;

        background: #e30613;
        color: white;
      }

      button:hover {
        background: #b00510;
      }

      .btn-secondary {
        background: #222;
      }

      .btn-secondary:hover {
        background: #333;
      }

      .btn-danger {
        background: #8b0000;
      }

      .btn-danger:hover {
        background: #a80000;
      }

      .btn-success {
        background: #1f7a3a;
        color: white;
      }

      .btn-success:hover {
        background: #249447;
      }

      /* --- Icon Button --- */
      .icon-btn {
        background: transparent;
        border: none;
        padding: 6px;

        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .icon-btn:hover {
        background: #222;
        border-radius: 6px;
      }

      .icon-btn i {
        font-size: large;
        color: #aaa;
        transition:
          transform 0.2s,
          color 0.2s;
      }

      .icon-btn:hover i {
        color: #fff;
      }

      details[open] > summary .icon-btn i {
        transform: rotate(180deg);
      }

      .flex-inline {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .text-field {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #222;
        background: #151515;
        color: white;
        width: 100%;
      }

      .sub-card {
        padding: 12px;
        background: #0f0f0f;
        border: 1px solid #222;
        border-radius: 8px;
        margin-bottom: 10px;
      }

      .match-url {
        font-size: 13px;
        color: #aaa;
        word-break: break-all;
      }

      pre {
        background: #0f0f0f;
        padding: 15px;
        border-radius: 8px;
        overflow-x: auto;
        font-size: 12px;
      }

      .icon {
        width: 14px;
        height: 14px;
        fill: white;
      }

      .spinner-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 10;

        justify-content: center;
        align-items: center;
      }

      .loader {
        aspect-ratio: 1;
        height: 25%;
        border: 5px solid #fff;
        border-bottom-color: #e30613;
        border-radius: 50%;
        animation: rotation 1s linear infinite;
      }

      @keyframes rotation {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body spinner>
    <header>
      <h1>ECF Admin Panel</h1>

      <button id="run-btn" class="btn-success" hx-post="/run" hx-swap="none">
        <i class="fa-solid fa-play" style="font-size: 24px"></i>
      </button>
    </header>
    <div class="container">
      <div class="content">
        <!-- Vorschau -->
        <details class="card" spinner id="card-preview">
          <summary class="card-header">
            <h2>Vorschau</h2>

            <div class="flex-inline" style="gap: 1rem">
              <button
                class="icon-btn"
                onclick="toggleDetails('card-preview')"
                type="button"
                aria-label="Toggle Vorschau"
              >
                <i class="fa-solid fa-chevron-down"></i>
              </button>
            </div>
          </summary>

          <div class="card-body">
            <div class="form-row">
              <select name="base_url" id="base_url" class="select">
                {% for doc in docs %}
                <option value="{{doc.url}}">{{doc.name}}</option>
                {% endfor %}
              </select>

              <label class="checkbox">
                <input type="checkbox" name="is_preview" id="is_preview" />
                <div class="toggle"></div>
                <span>Als Vorschau öffnen</span>
              </label>
            </div>

            <div
              id="preview"
              hx-get="/preview"
              hx-trigger="load, change from:#base_url, change from:#is_preview"
              hx-target="#preview"
              hx-include="#base_url, #is_preview"
              hx-swap="innerHTML"
            ></div>
          </div>
        </details>

        <!-- Matches -->
        <details class="card" spinner open id="card-matches">
          <summary class="card-header flex-inline">
            <h2>Matches</h2>
            <div class="flex-inline" style="gap: 1rem">
              <button
                class="btn-secondary"
                onclick="event.preventDefault()"
                hx-get="/matches"
                hx-target="#matches-container"
                hx-swap="innerHTML"
              >
                <i class="fa-solid fa-refresh"></i>
              </button>
              <button
                class="icon-btn"
                onclick="toggleDetails('card-matches')"
                type="button"
                aria-label="Toggle Vorschau"
              >
                <i class="fa-solid fa-chevron-down"></i>
              </button>
            </div>
          </summary>

          <div class="card-body">
            <div
              id="matches-container"
              hx-get="/matches"
              hx-trigger="load"
              hx-swap="innerHTML"
            >
              <div class="sub-card">
                <p>Matches werden geladen...</p>
              </div>
            </div>
          </div>
        </details>

        <!-- Logs -->
        <details class="card" spinner id="card-logs">
          <summary class="card-header flex-inline">
            <h2>Logs</h2>
            <div class="flex-inline" style="gap: 1rem">
              <button
                class="btn-secondary"
                onclick="event.preventDefault()"
                hx-get="/logs"
                hx-target="#logs-container"
                hx-swap="innerHTML"
              >
                <i class="fa-solid fa-refresh"></i>
              </button>
              <button
                class="icon-btn"
                onclick="toggleDetails('card-logs')"
                type="button"
                aria-label="Toggle Logs"
              >
                <i class="fa-solid fa-chevron-down"></i>
              </button>
            </div>
          </summary>

          <div class="card-body">
            <div
              id="logs-container"
              hx-get="/logs"
              hx-trigger="load"
              hx-swap="innerHTML"
            >
              <div class="sub-card">
                <p>Logs werden geladen...</p>
              </div>
            </div>
          </div>
        </details>
      </div>
    </div>

    <!-- Toast Container -->
    <div
      id="toast-container"
      style="position: fixed; top: 20px; right: 20px; z-index: 1000"
    ></div>

    <script>
      function showToast(message, type = "error") {
        const toast = document.createElement("div");
        toast.innerText = message;
        toast.style.background = type === "error" ? "#e30613" : "#333";
        toast.style.color = "white";
        toast.style.padding = "12px 20px";
        toast.style.marginTop = "10px";
        toast.style.borderRadius = "6px";
        toast.style.boxShadow = "0 2px 6px rgba(0,0,0,0.3)";
        toast.style.opacity = "0";
        toast.style.transition = "opacity 0.5s";

        document.getElementById("toast-container").appendChild(toast);

        // Fade in
        setTimeout(() => (toast.style.opacity = "1"), 10);

        // Fade out und entfernen nach 3 Sekunden
        setTimeout(() => {
          toast.style.opacity = "0";
          setTimeout(() => toast.remove(), 500);
        }, 3000);
      }

      // HTMX Hook für Fehler
      document.body.addEventListener("htmx:responseError", function (evt) {
        const detail = evt.detail.xhr.responseText;
        let message = "Ein Fehler ist aufgetreten";
        try {
          const json = JSON.parse(detail);
          if (json.detail) message = json.detail;
        } catch (e) {}
        showToast(message, "error");
      });
    </script>

    <script>
      function toggleDetails(id) {
        const el = document.getElementById(id);
        el.open = !el.open;
      }
    </script>

    <script>
      function ensureSpinner(container) {
        let spinner = container.querySelector(":scope > .spinner-overlay");

        if (!spinner) {
          spinner = document.createElement("div");
          spinner.className = "spinner-overlay";
          spinner.innerHTML = '<span class="loader"></span>';

          container.prepend(spinner);

          // wichtig: positioning sicherstellen
          const style = window.getComputedStyle(container);
          if (style.position === "static") {
            container.style.position = "relative";
          }
        }

        return spinner;
      }

      function getSpinner(el) {
        const container = el.closest("[spinner]");
        if (!container) {
          return document.getElementById("global-spinner");
        }

        return ensureSpinner(container);
      }

      document.body.addEventListener("htmx:beforeRequest", (evt) => {
        const spinner = getSpinner(evt.detail.target);
        if (spinner) {
          spinner.style.display = "flex";
          evt.detail._spinner = spinner;
        }

        const details = Array.from(document.getElementsByTagName("details"));
        evt.detail._detailStates = {};
        for (const detail of details) {
          if (!detail.id) {
            continue;
          }
          evt.detail._detailStates[detail.id] = detail.open;
        }
      });

      document.body.addEventListener("htmx:afterRequest", (evt) => {
        const spinner = evt.detail._spinner;
        if (spinner) {
          spinner.style.display = "none";
        }

        for (const [id, isOpen] of Object.entries(
          evt.detail._detailStates ?? {},
        )) {
          const detail = document.getElementById(id);
          if (!detail) {
            continue;
          }

          detail.open = isOpen;
        }
      });
    </script>
  </body>
</html>
